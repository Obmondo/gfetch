name: goreleaser

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    runs-on: ubuntu-24.04-htzhel1-ax42-a
    steps:
      - name: Checkout
        uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Login to Harbor
        uses: https://gitea.obmondo.com/Obmondo/setup-go@v4.2.0
        with:
          registry: harbor.obmondo.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Run GoReleaser
        uses: https://gitea.obmondo.com/Obmondo/goreleaser-action@v7.2.2
        with:
          version: v2.16.0
          args: release --clean -f .goreleaser-gitea.yaml
        env:
          GITEA_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
