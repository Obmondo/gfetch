name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-24.04-htzhel1-ax42-a
    steps:
      - uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.3
      - uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: Run tests
        run: go test ./...

  lint:
    runs-on: ubuntu-24.04-htzhel1-ax42-a
    steps:
      - uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.3
      - uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  fmt:
    runs-on: ubuntu-24.04-htzhel1-ax42-a
    steps:
      - uses: https://gitea.obmondo.com/Obmondo/checkout@v6.0.3
      - uses: https://gitea.obmondo.com/Obmondo/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: go fmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
